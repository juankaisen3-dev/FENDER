<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FENDER · Download videos for free</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="glass-header">
      <div class="logo">
        <i class="fas fa-bolt"></i>
        <span>FENDER</span>
      </div>
      <p class="tagline"><i class="fas fa-cloud-arrow-down"></i> Download your videos for free</p>
    </header>
    <main class="main-content">
  
      <section class="card download-card">
        <div class="card-header">
          <h2><i class="fas fa-plus-circle gradient-icon"></i> Nouveau téléchargement</h2>
          <p>Collez un lien YouTube, Vimeo, Tiktok, Facebook…</p>
        </div>
        
        <div class="input-group">
          <div class="url-input-wrapper">
            <i class="fas fa-link"></i>
            <input type="text" id="videoUrl" placeholder="https://...">
          </div>
          <button id="fetchInfoBtn" class="btn-secondary">
            <i class="fas fa-magnifying-glass"></i> Analyser
          </button>
        </div>

        <div id="infoPanel" class="info-panel hidden">
          <div class="preview-box">
            <div class="thumbnail-container">
              <img id="thumbnail" src="" alt="Miniature">
              <div class="play-overlay"><i class="fas fa-play"></i></div>
            </div>
            <div class="meta-info">
              <h3 id="videoTitle"></h3>
              <div class="meta-details">
                <span id="duration"><i class="far fa-clock"></i> --:--</span>
                <span id="uploader"><i class="far fa-user"></i> —</span>
              </div>
            </div>
          </div>
          
          <div class="quality-selector">
            <label><i class="fas fa-sliders"></i> Qualité :</label>
            <div class="quality-buttons">
              <button class="quality-btn" data-quality="high"><i class="fas fa-crown"></i> Haute</button>
              <button class="quality-btn active" data-quality="medium"><i class="fas fa-star"></i> Moyenne</button>
              <button class="quality-btn" data-quality="low"><i class="fas fa-compress"></i> Basse</button>
            </div>
          </div>
          
          <button id="downloadBtn" class="btn-primary">
            <i class="fas fa-download"></i> Télécharger
          </button>
          <div id="downloadStatus" class="status-message"></div>
        </div>
      </section>

      <section class="card library-card">
        <div class="card-header with-action">
          <h2><i class="fas fa-folder-open gradient-icon"></i> Vidéos téléchargées</h2>
          <button id="refreshGalleryBtn" class="btn-icon">
            <i class="fas fa-rotate"></i>
          </button>
        </div>
        
        <div id="gallery" class="gallery-grid">
          <div class="empty-state">
            <i class="fas fa-video-slash"></i>
            <p>Aucune vidéo pour le moment</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Développé par <span class="highlight">Daniel_Tech</span> <i class="fas fa-code"></i></p>
    </footer>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="script.js"></script>
</body>
</html>
